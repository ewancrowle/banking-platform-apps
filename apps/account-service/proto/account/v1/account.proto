syntax = "proto3";

package account.v1;

import "buf/validate/validate.proto";

message CreateAccountRequest {
  string first_name = 1 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string middle_names = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string last_name = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string email = 4 [(buf.validate.field).string = {
    email: true,
    min_len: 3,
    max_len: 254,
  }];
  string password = 5 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 254,
  }];
}

message CreateAccountResponse {
  int64 id = 1;
}

message VerifyCredentialsRequest {
  string email = 1;
  string password = 2;
}

message VerifyCredentialsResponse {
  optional int64 id = 1;
}

message GetAccountRequest {
  int64 id = 1;
}

message Account {
  string first_name = 1;
  string middle_names = 2;
  string last_name = 3;
  string email = 4;
  repeated KnownAddress known_addresses = 5;
}

message KnownAddress {
  string line_1 = 1;
  string line_2 = 2;
  string town = 3;
  string county = 4;
  string postcode = 5;
  bool is_primary = 6;
}

message GetAccountResponse {
  Account account = 1;
}

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
}
