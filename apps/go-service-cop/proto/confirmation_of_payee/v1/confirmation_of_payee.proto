syntax = "proto3";

package confirmation_of_payee.v1;

import "buf/validate/validate.proto";

message ConfirmPayeeRequest {
  string first_name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string last_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string account_num = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 8
  }];
}

message ConfirmPayeeResponse {
  string confirmation_of_payee_token = 1;
}

message IntrospectTokenRequest {
  string confirmation_of_payee_token = 1;
}

message IntrospectTokenResponse {
  int64 account_id = 1;
}

service ConfirmationOfPayeeService {
  rpc ConfirmPayee(ConfirmPayeeRequest) returns (ConfirmPayeeResponse);
  rpc IntrospectToken(IntrospectTokenRequest) returns (IntrospectTokenResponse);
}
