syntax = "proto3";

package payment.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";

message AuthorisePaymentRequest {
  int64 account_id = 1;
  optional int64 merchant_id = 2;
  optional string confirmation_of_payee_token = 3;
  int64 amount = 4;
  string currency_code = 5 [(buf.validate.field).string.len = 3];
  string description = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 25
  }];
  string type = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 25
  }];
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_DECLINED = 1;
  DECISION_APPROVED = 2;
}

enum DeclineReason {
  DECLINE_REASON_UNSPECIFIED = 0;
  DECLINE_REASON_INSUFFICIENT_FUNDS = 1;
  DECLINE_REASON_SUSPICIOUS_ACTIVITY = 2;
}

message AuthorisePaymentResponse {
  int64 payment_id = 1;
  Decision decision = 2;
  int64 decision_id = 3;
}

message IncrementPaymentRequest {
  int64 payment_id = 1;
  int64 replacement_amount = 2;
}

message CapturePaymentRequest {
  int64 payment_id = 1;
  optional int64 replacement_amount = 2;
}

message ExpirePaymentRequest {
  int64 payment_id = 1;
}

message VoidPaymentRequest {
  int64 payment_id = 1;
}

message GetPaymentsRequest {
  int64 account_id = 1;
}

message ForeignExchangeData {
  int64 local_amount = 1;
  string local_currency_code = 2;
  string exchange_rate = 3;
  string exchange_rate_provider = 4;
  string exchange_rate_at = 5;
}

message OtherAccountData {
  string first_name = 1;
  optional string middle_names = 2;
  string last_name = 3;
}

message Merchant {
  int64 id = 1;
  string descriptor = 2;
  string short_descriptor = 3;
  string mcc = 4;
  string line_1 = 5;
  string line_2 = 6;
  string town = 7;
  string postcode = 8;
  string country_code = 9;
  string created_at = 10;
  string updated_at = 11;
}

message Payment {
  int64 id = 1;
  int64 account_id = 2;
  repeated Payment payments = 3;
  optional int64 merchant_id = 4;
  optional int64 other_account_id = 5;
  optional OtherAccountData other_account_data = 6;
  int64 amount = 7;
  string currency_code = 8;
  string description = 9;
  string type = 10;
  string status = 11;
  optional ForeignExchangeData foreign_exchange_data = 12;
  string created_at = 13;
  optional string other_account_name = 14;
  optional Merchant merchant = 15;
  optional DeclineReason decline_reason = 16;
}

message GetPaymentsResponse {
  repeated Payment payments = 1;
}

service PaymentService {
  rpc AuthorisePayment(AuthorisePaymentRequest) returns (AuthorisePaymentResponse);
  rpc IncrementPayment(IncrementPaymentRequest) returns (google.protobuf.Empty);
  rpc CapturePayment(CapturePaymentRequest) returns (google.protobuf.Empty);
  rpc ExpirePayment(ExpirePaymentRequest) returns (google.protobuf.Empty);
  rpc VoidPayment(VoidPaymentRequest) returns (google.protobuf.Empty);
  rpc GetPayments(GetPaymentsRequest) returns (GetPaymentsResponse);
}
