syntax = "proto3";

package account.v1;

import "buf/validate/validate.proto";

message CreateAccountRequest {
  string first_name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  optional string middle_names = 2 [(buf.validate.field).string.max_len = 50];
  string last_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string email = 4 [(buf.validate.field).string = {
    email: true
    min_len: 3
    max_len: 254
  }];
  string password = 5 [(buf.validate.field).string = {
    min_len: 8
    max_len: 254
  }];
  string line_1 = 6 [(buf.validate.field).string.max_len = 35];
  optional string line_2 = 7 [(buf.validate.field).string = {max_len: 35}];
  string town = 8 [(buf.validate.field).string = {
    min_len: 1
    max_len: 35
  }];
  string postcode = 9 [(buf.validate.field).string = {
    min_len: 5
    max_len: 8
  }];
}

message CreateAccountResponse {
  int64 id = 1;
}

message GetAccountRequest {
  int64 id = 1;
}

message GetAccountResponse {
  int64 id = 1;
  string account_num = 2;
  string first_name = 3;
  string middle_names = 4;
  string last_name = 5;
  string email = 6;
  string line_1 = 7;
  string line_2 = 8;
  string town = 9;
  string postcode = 10;
  bool is_frozen = 11;
  string currency_code = 12;
  string created_at = 13;
}

message VerifyCredentialsRequest {
  string email = 1 [(buf.validate.field).string = {
    email: true
    min_len: 3
    max_len: 254
  }];
  string password = 2 [(buf.validate.field).string = {
    min_len: 8
    max_len: 254
  }];
}

message VerifyCredentialsResponse {
  optional int64 id = 1;
}

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
}
