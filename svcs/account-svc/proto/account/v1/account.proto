syntax = "proto3";

package account.v1;

import "buf/validate/validate.proto";

message CreateAccountRequest {
  string first_name = 1 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string middle_names = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string last_name = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50,
  }];
  string email = 4 [(buf.validate.field).string = {
    email: true,
    min_len: 3,
    max_len: 254,
  }];
  string password = 5 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 254,
  }];
  string line_1 = 6 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 35,
  }];
  string line_2 = 7 [(buf.validate.field).string = {
    max_len: 35,
  }];
  string town = 8 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 35,
  }];
  string postcode = 9 [(buf.validate.field).string = {
    min_len: 5,
    max_len: 8,
  }];
}

message CreateAccountResponse {
  int64 id = 1;
}

message VerifyCredentialsRequest {
  string email = 1 [(buf.validate.field).string = {
    email: true,
    min_len: 3,
    max_len: 254,
  }];
  string password = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 254,
  }];
}

message VerifyCredentialsResponse {
  optional int64 id = 1;
}

message GetAccountRequest {
  int64 id = 1;
}

message GetAccountResponse {
  string first_name = 1;
  string middle_names = 2;
  string last_name = 3;
  string email = 4;
  string line_1 = 5;
  string line_2 = 6;
  string town = 7;
  string postcode = 8;
  string created_at = 9;
}

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
}
