syntax = "proto3";

package ledger.v1;

message GetBalancesRequest {
  int64 account_id = 1;
}

message GetBalancesResponse {
  int64 current_balance = 1;
  int64 available_balance = 2;
  string currency_code = 3;
}

message GetTotalSpendingRequest {
  int64 account_id = 1;
}

message GetTotalSpendingResponse {
  int64 total_spent_today = 1;
  int64 total_spent_this_month = 2;
  string currency_code = 3;
}

service LedgerService {
  rpc GetBalances (GetBalancesRequest) returns (GetBalancesResponse);
  rpc GetTotalSpending (GetTotalSpendingRequest) returns (GetTotalSpendingResponse);
}