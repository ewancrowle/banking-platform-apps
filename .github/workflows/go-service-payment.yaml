on:
  push:
    paths:
      - "apps/go-service-id/**"
      - "apps/go-service-account/**"
      - "apps/go-service-merchant/**"
      - "apps/go-service-payment-decision/**"
      - "apps/go-service-payment/**"
      - "apps/go-service-cop/**"
      - ".github/workflows/go-service-payment.yaml"
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf generate apps/go-service-id --template apps/go-service-id/buf.gen.yaml --output apps/go-service-id
      - run: buf generate apps/go-service-account --template apps/go-service-account/buf.gen.yaml --output apps/go-service-account
      - run: buf generate apps/go-service-merchant --template apps/go-service-merchant/buf.gen.yaml --output apps/go-service-merchant
      - run: buf generate apps/go-service-payment-decision --template apps/go-service-payment-decision/buf.gen.yaml --output apps/go-service-payment-decision
      - run: buf generate apps/go-service-payment --template apps/go-service-payment/buf.gen.yaml --output apps/go-service-payment
      - run: buf generate apps/go-service-cop --template apps/go-service-cop/buf.gen.yaml --output apps/go-service-cop
      - name: Build
        run: go build -v apps/go-service-payment/cmd/server/main.go
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/payment-svc
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ./apps/go-service-payment/Dockerfile
