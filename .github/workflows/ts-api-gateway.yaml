on:
  push:
    paths:
      - "apps/go-service-id/**"
      - "apps/go-service-account/**"
      - "apps/go-service-oauth/**"
      - "apps/go-service-cop/**"
      - "apps/go-service-payment/**"
      - "apps/go-service-ledger/**"
      - "apps/go-service-merchant/**"
      - "apps/ts-api-gateway/**"
      - ".github/workflows/ts-api-gateway.yaml"
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf generate apps/go-service-id --include-imports --template apps/go-service-id/buf.gen.yaml --output apps/go-service-id
      - run: buf generate apps/go-service-account --include-imports --template apps/go-service-account/buf.gen.yaml --output apps/go-service-account
      - run: buf generate apps/go-service-oauth --include-imports --template apps/go-service-oauth/buf.gen.yaml --output apps/go-service-oauth
      - run: buf generate apps/go-service-cop --include-imports --template apps/go-service-cop/buf.gen.yaml --output apps/go-service-cop
      - run: buf generate apps/go-service-payment --include-imports --template apps/go-service-payment/buf.gen.yaml --output apps/go-service-payment
      - run: buf generate apps/go-service-ledger --include-imports --template apps/go-service-ledger/buf.gen.yaml --output apps/go-service-ledger
      - run: buf generate apps/go-service-merchant --include-imports --template apps/go-service-merchant/buf.gen.yaml --output apps/go-service-merchant
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
        working-directory: apps/ts-api-gateway
      - name: Type check
        run: bun run typecheck
        working-directory: apps/ts-api-gateway
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api-server
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ./apps/ts-api-gateway/Dockerfile
